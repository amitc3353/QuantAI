name: CI — Guard Engine Tests

on:
  push:
    paths:
      - 'guard-engine/**'
      - 'configs/guard_config.json'
  pull_request:
    paths:
      - 'guard-engine/**'

jobs:
  test-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd guard-engine
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run guard tests
        run: |
          cd guard-engine
          python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint
        run: |
          pip install ruff
          ruff check guard-engine/ orchestrator/ discord-bot/
